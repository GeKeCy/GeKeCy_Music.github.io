<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta name="referrer" content="no-referrer">
    <title>歌曲播放 - 歌曲海</title>
    <link href="static/css/common.css" rel="stylesheet">
    <link href="//lib.baomitu.com/twitter-bootstrap/4.6.1/css/bootstrap.min.css" type="text/css" rel="stylesheet">
    <link href="//lib.baomitu.com/font-awesome/4.7.0/css/font-awesome.min.css" type="text/css" rel="stylesheet">
    <link href="//lib.baomitu.com/jquery-confirm/3.3.4/jquery-confirm.min.css" type="text/css" rel="stylesheet">
    <link href="//lib.baomitu.com/aplayer/1.10.1/APlayer.min.css" rel="stylesheet">
    <script src="//lib.baomitu.com/jquery/3.6.0/jquery.min.js" type="application/javascript"></script>
    <script defer src="//lib.baomitu.com/twitter-bootstrap/4.6.1/js/bootstrap.min.js" type="application/javascript"></script>
    <script defer src="//lib.baomitu.com/jquery-confirm/3.3.4/jquery-confirm.min.js" type="application/javascript"></script>
    <script defer src="static/js/common.js"></script>
    <script defer src="//lib.baomitu.com/aplayer/1.10.1/APlayer.min.js" type="application/javascript"></script>
    <style>
        .aplayer-container { width: 80%; max-width: 800px; position: relative; }
        .favorite-icon { position: absolute; top: 20px; right: 20px; cursor: pointer; color: #ccc; font-size: 24px; transition: color 0.3s ease, transform 0.2s ease; z-index: 10; }
        .favorite-icon:hover { color: #ff6a00; transform: scale(1.1); }
        .content-lrc { min-height: 21rem; max-height: 21rem; overflow: hidden; font-family: "Microsoft YaHei", sans-serif; background-color: #ffffff; line-height: 1.8; color: #555; margin-bottom: 10px; letter-spacing: 0.01em; padding-left: 5px; }
        .expand { text-align: center; cursor: pointer; color: #009688; }
        .height-auto { max-height: unset; }
        .nowrap-hidden { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .aplayer-notice { z-index: 2; }
        .aplayer .aplayer-lrc p.aplayer-lrc-current { color: #FF6666; opacity: 1; overflow: visible; height: auto !important; min-height: 16px; }
        @media (min-width: 768px) { .aplayer .aplayer-lrc p.aplayer-lrc-current { font-size: 17px; } }
        @media (max-width: 767.98px) { .aplayer .aplayer-lrc p.aplayer-lrc-current { font-size: 14px; } }
        .aplayer .aplayer-lrc p { font-weight: 700; font-size: 13px; color: #777; line-height: 21px !important; height: 16px !important; padding: 0 !important; margin: 0 !important; transition: all 0.5s ease-out; opacity: .4; overflow: hidden; }
        .pl-1, .px-1 { padding-left: 0.5rem !important; }
        .pr-1, .px-1 { padding-right: 0.7rem !important; }
        p { margin-top: 26px; }
        .badge { margin-right: 3px; display: inline-block; padding: .25em .6em; font-size: 75%; font-weight: 700; line-height: 1; text-align: center; white-space: nowrap; vertical-align: baseline; border-radius: 0.7rem; }
        .table .thead-light th { color: #495057; background-color: #f8f9fa; border-color: #dee2e6; }
        .table td, .table th { padding: 0.65rem; vertical-align: top; border-top: 1px solid #dee2e6; }
        .table thead th { vertical-align: bottom; border-bottom: 1px solid #dee2e6; }
        .card { margin-top: 15px; position: relative; display: -ms-flexbox; display: flex; -ms-flex-direction: column; flex-direction: column; min-width: 0; word-wrap: break-word; background-color: #fff; background-clip: border-box; border: 1px solid rgba(0,0,0,.125); border-radius: .5rem; }
        .reddot:after { content: ""; background: #31c27c; border: 1px solid #31c27c; border-radius: 50%; padding: 3px; position: absolute; }

        .aplayer-pic { transition: transform 2s linear infinite; }
        .aplayer-pic.rotating { animation: rotate 30s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .aplayer .aplayer-pic .aplayer-pause { display: none; width: 16px; height: 16px; border: 2px solid #fff; bottom: 40%; right: 40%; }
        .aplayer.aplayer-withlrc .aplayer-pic { height: 74px; width: 74px; border-radius: 50%; margin: 19px; position: relative; z-index: 2; }
        .aplayer::before { content: ""; position: absolute; width: 112px; height: 112px; background-image: url("static/img/play.png"); background-size: cover; background-repeat: no-repeat; border-radius: 50%; z-index: 2; pointer-events: none; animation: none !important; }
        .aplayer { background: #ffffff; font-family: Arial, Helvetica, sans-serif; margin: 0px; box-shadow: 0 0 0 0 rgba(0,0,0,.07), 0 0 0 0 rgba(0,0,0,.1); border-radius: 43px 10px 10px 43px; overflow: hidden; -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none; line-height: normal; position: relative; }
        .quote-warning { border-left: 4px solid #31c27c; background-color: #f7f7f7; padding: .5rem; color: #6c757d; margin-bottom: 0rem !important; }
        .btn-custom { background-color: #31c27c; border-color: #31c27c; color: white; border-radius: 0; }
        .btn-custom:hover { background-color: #31c27c; border-color: #31c27c; }
        .aplayer.aplayer-withlrc .aplayer-info { margin-left: 120px; height: 90px; padding: 5px 0px 0; }
        .aplayer .aplayer-lrc { display: none; position: relative; height: 38px; text-align: center; overflow: hidden; margin: 9px 0 13px; }
        .aplayer .aplayer-info .aplayer-music { overflow: hidden; white-space: nowrap; text-overflow: ellipsis; margin: 6px 0 6px 12px; -webkit-user-select: text; -moz-user-select: text; -ms-user-select: text; user-select: text; cursor: default; padding-bottom: 2px; height: 20px; }
        .aplayer .aplayer-lrc:before { top: 0; height: 5%; background: linear-gradient(180deg, #fff 0, hsla(0,0%,100%,0)); }
        .aplayer-author a { text-decoration: none; color: inherit; }
        .text-white { color: #999 !important; }
        footer .text-white { font-size: 14px !important; }
        footer .nav-link { font-size: 13px !important; }
        a:hover { color: #31c27c; text-decoration: underline; }
        .download-button { background-color: #31c27c !important; color: white !important; border: none !important; }
        @media (max-width: 768px) {
            .download-text { display: none; }
            #btn-download-mp3::after { content: "下载"; }
            #btn-download-lrc::after { content: "下载"; }
        }
        .loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.85); display: flex; align-items: center;
            justify-content: center; z-index: 9999; flex-direction: column;
        }
        .loading-overlay .spinner-border { width: 3rem; height: 3rem; }
        .error-box { border-left: 4px solid #ff5252; background-color: #fff5f5; padding: 1rem; color: #d32f2f; border-radius: 4px; margin: 15px 0; }
    </style>
</head>
<body>
    <!-- Loading overlay -->
    <div class="loading-overlay" id="loading-overlay">
        <div class="spinner-border text-success" role="status">
            <span class="sr-only">加载中...</span>
        </div>
        <p style="margin-top: 15px; color: #666;">正在获取歌曲信息...</p>
    </div>

    <div class="container" style="max-width: 900px">
        <nav class="navbar navbar-light bg-white px-0 mb-1 font-weight-normal">
            <a class="navbar-brand font-weight-bolder" style="font-size: 1.5rem;color: #50514F;" href="index.html" aria-label="GeKeCy-music">
                GeKeCy-music
            </a>
        </nav>

        <div class="row mb-2"></div>

        <div class="card shadow-sm mb-3">
            <div class="card-body">
                <!-- Error message area -->
                <div id="error-area" style="display: none;">
                    <div class="error-box">
                        <i class="fa fa-exclamation-circle"></i>
                        <span id="error-text">歌曲信息加载失败</span>
                    </div>
                </div>

                <!-- Player area -->
                <div id="player-area">
                    <div id="aplayer" class="aplayer aplayer-withlrc"></div>
                    <br>

                    <!-- Song title bar -->
                    <div class="input-group mb-1 overflow-hidden" style="margin-bottom: 0.9rem !important;">
                        <div class="input-group-prepend">
                            <i class="fa fa-music input-group-text" style="color: #ffffff;background-color: #31c27c !important;border: 1px solid #31c27c;padding: .55rem .75rem;border-radius: 0;"></i>
                        </div>
                        <h1 id="song-title" class="form-control bg-light nowrap-hidden" style="color: #ffffff;background-color: #31c27c !important;border: 1px solid #31c27c;">加载中...</h1>
                        <div class="input-group-append">
                            <a id="btn-download-mp3" class="btn btn-custom" href="javascript:void(0)" target="_blank">
                                <i class="fa fa-download"></i>
                                <span class="download-text">下载歌曲</span>
                            </a>
                        </div>
                    </div>

                    <!-- LRC download bar -->
                    <div class="input-group overflow-hidden">
                        <div class="input-group-prepend">
                            <i class="fa fa-file-text-o input-group-text" style="color: #ffffff; background-color: #31c27c !important;border: 1px solid #31c27c;padding: .55rem .75rem;border-radius: 0;"></i>
                        </div>
                        <h2 class="form-control bg-light nowrap-hidden" style="color: #ffffff;background-color: #31c27c !important;border: 1px solid #31c27c;" id="lrc-title-bar">
                            加载中...
                        </h2>
                        <div class="input-group-append">
                            <a id="btn-download-lrc" class="btn btn-custom" href="javascript:void(0)">
                                <i class="fa fa-download"></i>
                                <span class="download-text">下载歌词</span>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Lyrics section -->
        <div class="card shadow-sm mb-3" id="lyrics-card" style="display: none;">
            <div class="card-body">
                <div style="display: block">
                    <div class="content-lrc mt-1" id="content-lrc"></div>
                    <div style="display: none;" class="content-lrc mt-1" id="content-lrc2"></div>
                    <div class="expand" data-status="up" onclick="toggleLyrics()">查看全部</div>
                </div>
                <br>
                <div class="quote-warning mb-4">
                    <i class="fa fa-info-circle"></i>
                    如在线播放和下载错误，请更换浏览器刷新重试。
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-dark py-1 my-0 border-top mt-4">
        <div class="container" style="max-width: 900px;">
            <div class="mt-1 d-flex flex-wrap justify-content-center align-items-center">
                <a href="index.html" class="text-white text-center">
                    GeKeCy-music &copy; 2026
                </a>
            </div>
        </div>
    </footer>

<script type="text/javascript">
    // Get URL params
    function getParam(name) {
        var params = new URLSearchParams(window.location.search);
        return params.get(name) || '';
    }

    var songId = getParam('id');
    var songName = decodeURIComponent(getParam('name') || '未知歌曲');
    var artistName = decodeURIComponent(getParam('artist') || '未知歌手');
    var mp3Url = '';
    var lrcText = '';
    var coverUrl = 'https://img2.kuwo.cn/star/albumcover/500/s4s86/95/3059703046.jpg'; // default cover

    if (!songId) {
        $('#loading-overlay').hide();
        $('#error-area').show();
        $('#error-text').text('缺少歌曲ID参数');
        $('#player-area').hide();
    } else {
        // Fetch song detail from API
        $.ajax({
            type: 'GET',
            url: '/api/song-detail',
            dataType: 'json',
            data: { id: songId },
            timeout: 15000,
            success: function(data) {
                if (data && data.title) {
                    // Use data from API
                    songName = data.title;
                    artistName = data.artist || artistName;
                    mp3Url = data.link || '';
                    lrcText = data.lyric || '';
                    coverUrl = data.cover || coverUrl;
                    
                    // Update page title and info
                    document.title = songName + '-' + artistName + '-MP3播放-歌曲海';
                    $('#song-title').text(songName);
                    $('#song-artist').text(artistName);
                }
                initPlayer();
            },
            error: function() {
                // API failed -> use demo mode
                console.log('API unavailable, entering demo mode for player...');
                lrcText = '[00:00.00]' + songName + ' - ' + artistName + '\n' +
                    '[00:04.00]词：未知\n[00:07.00]曲：未知\n' +
                    '[00:12.00]' + songName + '\n' +
                    '[00:16.00]第一段歌词（演示内容）\n[00:20.00]第二段歌词继续演唱\n' +
                    '[00:24.00]旋律渐渐响起\n[00:28.00]回忆在脑海中浮现\n' +
                    '[00:32.00]每一句都是故事\n[00:36.00]每一个音符都有温度\n' +
                    '[00:40.00]副歌部分\n[00:44.00]让你感受到音乐的力量\n' +
                    '[00:48.00]啦啦啦啦啦啦\n[00:52.00]啦啦啦啦啦啦啦\n' +
                    '[00:56.00]啦啦啦啦啦啦啦啦\n[01:00.00]间奏\n' +
                    '[01:08.00]第二段开始\n[01:12.00]换了新的心情\n' +
                    '[01:16.00]音乐从未停止\n[01:20.00]梦想还在继续\n' +
                    '[01:24.00]啦啦啦啦啦啦\n[01:28.00]啦啦啦啦啦啦啦\n' +
                    '[01:32.00]啦啦啦啦啦啦啦啦\n[01:36.00]尾声渐弱\n' +
                    '[01:40.00]（演示模式 - 歌词为模拟数据）';
                initPlayer();
            },
            complete: function() {
                $('#loading-overlay').hide();
            }
        });
    }

    function initPlayer() {
        var hasPlayableUrl = mp3Url && mp3Url.length > 0;

        // Update song title
        $('#song-title').text(songName + '-' + artistName + '.mp3');
        $('#lrc-title-bar').text(songName + '-' + artistName + '-歌词.lrc');

        // Set download MP3 button
        if (hasPlayableUrl) {
            $('#btn-download-mp3').attr('href', mp3Url);
        } else {
            $('#btn-download-mp3').attr('href', 'javascript:void(0)');
            $('#btn-download-mp3').click(function(e) {
                e.preventDefault();
                jAlert('无法获取歌曲下载链接，可能是网络问题或该歌曲需要VIP。');
            });
        }

        // Set LRC download button
        if (lrcText) {
            $('#btn-download-lrc').click(function() {
                var blob = new Blob([lrcText], { type: 'text/plain;charset=utf-8' });
                var url = URL.createObjectURL(blob);
                var a = document.createElement('a');
                a.style.display = 'none';
                a.href = url;
                a.download = songName + '-' + artistName + '-歌词.lrc';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            });

            // Parse LRC for display
            parseAndDisplayLyrics(lrcText);
        } else {
            $('#btn-download-lrc').click(function() {
                jAlert('暂无歌词');
            });
            $('#lyrics-card').hide();
        }

        // Initialize APlayer
        if (typeof APlayer !== 'undefined') {
            window.ap = new APlayer({
                container: document.getElementById('aplayer'),
                autoplay: false,
                theme: '#FF5555',
                lrcType: 3, // lrcType 3 = JS string
                preload: 'metadata',
                loop: 'none',
                order: 'list',
                volume: 0.5,
                audio: [{
                    name: songName,
                    artist: artistName,
                    url: hasPlayableUrl ? mp3Url : '',
                    cover: coverUrl,
                    lrc: lrcText || '',
                    theme: '#FF5555'
                }]
            });

            // Cover rotation animation
            var cover = document.querySelector('.aplayer-pic');
            if (cover) {
                ap.on('play', function() { cover.classList.add('rotating'); });
                ap.on('pause', function() { cover.classList.remove('rotating'); });
            }

            // Error handling
            if (!hasPlayableUrl) {
                setTimeout(function() {
                    if (ap) {
                        ap.notice('<span style="color:#FF5722;font-weight:bold"><i class="fa fa-exclamation-circle"></i> 无法获取播放链接，可能是网络问题或该歌曲需要VIP</span>', 5000, 1);
                    }
                }, 1000);
            }
        }

        // Update document title
        document.title = songName + '-' + artistName + '-MP3播放-歌曲海';
    }

    function parseAndDisplayLyrics(lrcString) {
        // Parse LRC format: [mm:ss.xx]text
        var lines = lrcString.split('\n');
        var plainLyrics = [];
        var lrcLyrics = [];

        for (var i = 0; i < lines.length; i++) {
            var line = lines[i].trim();
            if (!line) continue;

            // Extract text (remove timestamp)
            var textPart = line.replace(/\[\d{2}:\d{2}(\.\d{2,3})?\]/g, '').trim();
            if (!textPart) continue;

            plainLyrics.push(escapeHtml(textPart));
            lrcLyrics.push(line);
        }

        // Display plain lyrics
        var contentLrc = document.getElementById('content-lrc');
        var contentLrc2 = document.getElementById('content-lrc2');
        if (contentLrc) {
            contentLrc.innerHTML = plainLyrics.join('<br>');
        }
        if (contentLrc2) {
            contentLrc2.textContent = lrcLyrics.join('\n');
        }

        // Show lyrics card
        $('#lyrics-card').show();
    }

    function escapeHtml(text) {
        var div = document.createElement('div');
        div.appendChild(document.createTextNode(text));
        return div.innerHTML;
    }

    function toggleLyrics() {
        var $content = $('.content-lrc');
        var $expand = $('.expand');
        if ($expand.attr('data-status') === 'up') {
            $content.addClass('height-auto');
            $expand.attr('data-status', 'down');
            $expand.text('收起');
        } else {
            $content.removeClass('height-auto');
            $expand.attr('data-status', 'up');
            $expand.text('查看全部');
        }
    }
</script>
</body>
</html>
