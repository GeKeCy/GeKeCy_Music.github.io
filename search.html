<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>搜索 - GeKeCy-music</title>
    <link href="static/css/common.css" rel="stylesheet">
    <link href="//lib.baomitu.com/twitter-bootstrap/4.6.1/css/bootstrap.min.css" type="text/css" rel="stylesheet">
    <link href="//lib.baomitu.com/font-awesome/4.7.0/css/font-awesome.min.css" type="text/css" rel="stylesheet">
    <script src="//lib.baomitu.com/jquery/3.6.0/jquery.min.js" type="application/javascript"></script>
    <script defer src="//lib.baomitu.com/twitter-bootstrap/4.6.1/js/bootstrap.min.js" type="application/javascript"></script>
    <style>
        html, body { height: auto; margin: 0; overflow-x: hidden; }
        body { display: flex; flex-direction: column; font-family: "Microsoft YaHei", "Helvetica Neue", Helvetica, STHeiTi, sans-serif; }
        .main-content { flex: 0 0 auto; width: 100%; }
        .badge { margin-right: 3px; display: inline-block; padding: .25em .6em; font-size: 75%; font-weight: 700; line-height: 1; text-align: center; white-space: nowrap; vertical-align: baseline; border-radius: 0.7rem; }
        .card { margin-top: 15px; position: relative; display: flex; flex-direction: column; min-width: 0; word-wrap: break-word; background-color: #fff; background-clip: border-box; border: 1px solid rgba(0, 0, 0, .125); border-radius: .5rem; font-size: 15px; }
        .btn-custom { background-color: #31c27c; border-color: #31c27c; color: white; border-radius: 0 0.25rem 0.25rem 0 !important; height: 40px; }
        .btn-custom:hover { background-color: #2ab06d; border-color: #2ab06d; }
        a { color: #333; text-decoration: none; background-color: transparent; }
        a:hover { color: #31c27c; text-decoration: underline; }
        .form-control:focus { background-color: #fff; border-color: #31c27c; outline: 0; box-shadow: 0 0 0 .2rem #31c27c38; }
        .form-control { border: 1px solid #31c27c; }
        .navbar-h1 { display: inline; font-size: 1.5rem; font-weight: 700; }
        .quote-warning { border-left: 4px solid #31c27c; background-color: #f8f9fa; padding: .5rem; color: #434343; }
        .table { width: 100%; margin-bottom: 0rem; color: #212529; }
        .table td, .table th { font-size: 15px; color: #999; padding: 1.15rem; vertical-align: middle; border-top: 0px solid #dee2e6; }
        .table-striped tbody tr:nth-child(odd) { background-color: #ffffff; }
        .table-striped tbody tr:nth-child(even) { background-color: #fafafa; }
        .table-striped tbody tr:hover { background-color: #f5f5f5; }
        .table thead th { vertical-align: bottom; border-bottom: 0px solid #dee2e6; }
        .text-info { color: #333 !important; }
        .font-weight-bold { font-weight: 545 !important; font-size: 15px; line-height: 1; }
        .loading { text-align: center; padding: 40px; color: #999; }
        .original-tag {
            display: inline-block;
            background-color: #31c27c;
            color: #fff;
            font-size: 12px;
            padding: 2px 8px;
            border-radius: 6px;
            margin-right: 8px;
            font-weight: 500;
            vertical-align: middle;
            white-space: nowrap;
        }
        footer {
            flex-shrink: 0; background-color: #343a40; color: #999;
            padding: 40px 0 20px 0; margin-top: 30px; width: 100%;
        }
        footer a { color: #ccc; }
        footer a:hover { color: #31c27c; }
        .footer-links { margin: 10px 0; }
        .footer-links a { margin: 0 10px; font-size: 13px; }
    </style>
</head>
<body>
<div class="main-content">
<div class="container" style="max-width: 900px">
    <nav class="navbar navbar-light bg-white px-0 mb-1 font-weight-normal">
        <a class="navbar-brand font-weight-bolder" style="font-size: 1.5rem; color: #50514F;" href="index.html">
            <h1 class="navbar-h1">GeKeCy-music</h1>
        </a>
    </nav>

    <form id="search-form" style="margin-top: 1rem !important;margin-bottom: .5rem !important;">
        <div class="input-group">
            <input type="text" id="keyword-input" class="form-control text-center border border-info" placeholder="请输入歌名/歌手名" style="border-right-color: #31c27c !important;border-radius: 0.25rem 0 0 0.25rem !important;height: 40px;">
            <button type="submit" class="btn btn-custom shadow-sm rounded-sm btn-block mb-1" style="width: 60px;padding: 0px;">
                <i class="fa fa-search"></i>
            </button>
        </div>
    </form>

    <div class="card shadow-sm">
        <div class="card-body">
            <div class="quote-warning mb-4" style="text-align: left;font-size: 14px">
                搜索结果：<strong id="result-count">0</strong> 条
            </div>
            <div id="loading" class="loading">
                <i class="fa fa-spinner fa-spin"></i> 加载中...
            </div>
            <table class="table table-striped table-hover" id="result-table" style="display:none;">
                <thead>
                    <tr style="background: #fafafa;">
                        <th scope="col" style="width: 10%;text-align: center;">序号</th>
                        <th scope="col" style="width: auto">
                            <i class="fa fa-music"></i>
                            <span>歌曲</span>
                        </th>
                        <th scope="col" style="width: auto;text-align: left;">
                            <i class="fa fa-user-circle"></i>
                            <span>歌手</span>
                        </th>
                    </tr>
                </thead>
                <tbody id="result-body">
                </tbody>
            </table>
            <div id="no-result" class="loading" style="display:none;">
                没有找到相关歌曲，请换个关键词试试
            </div>
        </div>
    </div>
</div>
</div>

<footer>
    <div class="container" style="max-width: 900px;">
        <div class="text-center">
            <a href="index.html" class="font-weight-bold" style="font-size:18px;color:#fff;">GeKeCy-music</a>
            <div class="footer-links">
                <a href="index.html">首页</a>
                <a href="https://github.com/GeKeCy/GeKeCy_Music.github.io" target="_blank">GitHub</a>
            </div>
            <div style="font-size:12px;color:#666;margin-top:10px;">
                GeKeCy-music &copy; 2026 &middot; 仅供学习交流使用
            </div>
        </div>
    </div>
</footer>

<script type="text/javascript">
    function getQueryParam(name) {
        var urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(name) || '';
    }

    function escapeHtml(text) {
        var div = document.createElement('div');
        div.appendChild(document.createTextNode(text));
        return div.innerHTML;
    }

    function isOriginalVersion(title, keyword) {
        var t = title.toLowerCase();
        var k = keyword.toLowerCase().trim();
        var nonOriginalPatterns = [
            'live', '演唱会', '现场', '伴奏', '和声', '纯音乐',
            'dj ', 'dj版', 'remix', '版)', '片段', '翻唱',
            'cover', '铃声', '钢琴版', '吉他版', '古筝版',
            '纯享版', '完整版'
        ];
        for (var i = 0; i < nonOriginalPatterns.length; i++) {
            if (t.indexOf(nonOriginalPatterns[i]) !== -1) {
                return false;
            }
        }
        if (t.indexOf('(') !== -1 || t.indexOf('（') !== -1) {
            if (t.indexOf(k) === 0 && (t.indexOf('(') === k.length || t.indexOf('（') === k.length)) {
                return false;
            }
        }
        return true;
    }

    function sortSongs(songs, keyword) {
        var original = [];
        var others = [];
        songs.forEach(function(s) {
            if (isOriginalVersion(s.title || '', keyword)) {
                original.push(s);
            } else {
                others.push(s);
            }
        });
        original.sort(function(a, b) {
            var aTitle = a.title || '';
            var bTitle = b.title || '';
            var aExact = aTitle === keyword ? 0 : 1;
            var bExact = bTitle === keyword ? 0 : 1;
            if (aExact !== bExact) return aExact - bExact;
            return aTitle.length - bTitle.length;
        });
        return original.concat(others);
    }

    function doSearch(keyword) {
        if (!keyword) return;
        $('#loading').show();
        $('#result-table').hide();
        $('#no-result').hide();
        $('#result-count').text('0');

        $.getJSON('https://met.api.xiaoguan.fit/api?server=netease&type=search&id=' + encodeURIComponent(keyword), function(data) {
            $('#loading').hide();
            if (Array.isArray(data) && data.length > 0) {
                var sorted = sortSongs(data, keyword);
                $('#result-count').text(sorted.length);
                var html = '';
                var originalSet = {};
                sorted.forEach(function(s) {
                    if (isOriginalVersion(s.title || '', keyword)) {
                        originalSet[s.title + '|' + s.author] = true;
                    }
                });
                sorted.forEach(function(song, i) {
                    var urlMatch = song.url && song.url.match(/id=(\d+)/);
                    var songId = urlMatch ? urlMatch[1] : '';
                    var title = song.title || '';
                    var artist = song.author || '';
                    var isOrig = originalSet[title + '|' + artist];
                    var tagHtml = isOrig ? '<span class="original-tag">原唱</span>' : '';
                    if (songId) {
                        html += '<tr>' +
                            '<td style="font-size: 17px;color: grey;font-weight: 700;width: 56px;text-align: center;">' + (i + 1) + '</td>' +
                            '<td>' + tagHtml + '<a href="play.html?id=' + encodeURIComponent(songId) + '" class="text-info font-weight-bold">' + escapeHtml(title) + '</a></td>' +
                            '<td style="color: #666;font-size: 15px;">' + escapeHtml(artist) + '</td>' +
                            '</tr>';
                    }
                });
                $('#result-body').html(html);
                $('#result-table').show();
            } else {
                $('#no-result').show();
            }
        }).fail(function() {
            $('#loading').hide();
            $('#no-result').show();
        });
    }

    $(function() {
        var keyword = getQueryParam('keyword');
        if (keyword) {
            $('#keyword-input').val(keyword);
            doSearch(keyword);
        }

        $('#search-form').submit(function(e) {
            e.preventDefault();
            var kw = $('#keyword-input').val().trim();
            if (kw) {
                window.location.href = 'search.html?keyword=' + encodeURIComponent(kw);
            }
        });
    });
</script>
</body>
</html>
