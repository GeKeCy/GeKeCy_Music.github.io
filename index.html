<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta name="keywords" content="GeKeCy-music,音乐搜索,免费音乐下载,MP3下载,在线音乐">
    <meta name="description" content="GeKeCy-music - 免费在线音乐搜索与下载平台">
    <meta name="format-detection" content="telephone=no">
    <title>GeKeCy-music - 音乐搜索</title>
    <link href="static/css/common.css" type="text/css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="static/css/site.min.css">
    <link href="//lib.baomitu.com/twitter-bootstrap/4.6.1/css/bootstrap.min.css" type="text/css" rel="stylesheet">
    <link href="//lib.baomitu.com/font-awesome/4.7.0/css/font-awesome.min.css" type="text/css" rel="stylesheet">
    <script src="//lib.baomitu.com/jquery/3.6.0/jquery.min.js" type="application/javascript"></script>
    <script defer src="//lib.baomitu.com/twitter-bootstrap/4.6.1/js/bootstrap.min.js" type="application/javascript"></script>
    <style>
        html, body { height: auto; margin: 0; overflow-x: hidden; }
        body { display: flex; flex-direction: column; font-family: "Microsoft YaHei", "Helvetica Neue", Helvetica, STHeiTi, sans-serif; }
        .main-content { flex: 0 0 auto; width: 100%; }
        .search-img {
            background: url("static/img/chicken.gif") no-repeat scroll left top transparent;
            display: block; height: 0; left: 39%; margin-left: -12px;
            position: absolute; top: 0; width: 24px;
        }
        .card {
            margin-top: 15px; position: relative; display: flex; flex-direction: column;
            min-width: 0; word-wrap: break-word; background-color: #fff;
            background-clip: border-box; border: 1px solid rgba(0,0,0,.125);
            border-radius: .5rem; font-size: 15px;
        }
        .btn-custom {
            background-color: #31c27c; border-color: #31c27c; color: white;
            border-radius: 0 0.25rem 0.25rem 0 !important; height: 40px;
        }
        .btn-custom:hover { background-color: #2ab06d; border-color: #2ab06d; }
        a { color: #333; text-decoration: none; background-color: transparent; }
        a:hover { color: #31c27c; text-decoration: none; }
        .form-control:focus { background-color: #fff; border-color: #31c27c; outline: 0; box-shadow: 0 0 0 .2rem #31c27c38; }
        .form-control { border: 1px solid #31c27c; }
        .navbar-h1 { display: inline; font-size: 1.5rem; font-weight: 700; }
        .border-info { border-color: #31c27c !important; }

        .navbar-fixed {
            position: sticky;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background-color: #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .navbar-fixed .nav-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 56px;
        }
        .back-to-top {
            color: #31c27c;
            font-size: 13px;
            cursor: pointer;
            padding: 4px 8px;
            transition: color 0.2s;
            position: relative;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }
        .back-to-top:hover { color: #2ab06d; }
        .back-to-top.active {
            text-decoration: underline;
            text-underline-offset: 3px;
        }
        .page-content { padding-top: 0; }

        .hot-tag {
            display: inline-block; padding: 6px 14px; margin: 4px;
            border-radius: 20px; font-size: 14px; cursor: pointer;
            transition: all 0.2s; border: 1px solid #e8e8e8; color: #555;
        }
        .hot-tag:hover { background-color: #31c27c; color: #fff; border-color: #31c27c; }
        .hot-tag .rank { display: inline-block; width: 20px; height: 20px; line-height: 20px;
            text-align: center; border-radius: 50%; font-size: 12px; margin-right: 6px; font-weight: bold; }
        .hot-tag.top1 .rank { background: #ff4d4f; color: #fff; }
        .hot-tag.top2 .rank { background: #ff7a45; color: #fff; }
        .hot-tag.top3 .rank { background: #ffa940; color: #fff; }
        .hot-tag .rank { background: #f0f0f0; color: #999; }

        .artist-tag {
            display: inline-flex; align-items: center; padding: 4px 10px; margin: 4px;
            border-radius: 20px; font-size: 14px; cursor: pointer;
            transition: all 0.2s; border: 1px solid #e8e8e8; color: #555;
        }
        .artist-tag:hover { background-color: #31c27c; color: #fff; border-color: #31c27c; }
        .artist-tag img { width: 24px; height: 24px; border-radius: 50%; margin-right: 6px; object-fit: cover; }
        .artist-tag .rank { display: inline-block; width: 20px; height: 20px; line-height: 20px;
            text-align: center; border-radius: 50%; font-size: 12px; margin-right: 6px; font-weight: bold; }
        .artist-tag.top1 .rank { background: #ff4d4f; color: #fff; }
        .artist-tag.top2 .rank { background: #ff7a45; color: #fff; }
        .artist-tag.top3 .rank { background: #ffa940; color: #fff; }
        .artist-tag .rank { background: #f0f0f0; color: #999; }

        footer {
            flex-shrink: 0; background-color: #343a40; color: #999;
            padding: 40px 0 20px 0; margin-top: 30px; width: 100%;
        }
        footer a { color: #ccc; }
        footer a:hover { color: #31c27c; }
        .footer-links { margin: 10px 0; }
        .footer-links a { margin: 0 10px; font-size: 13px; }
    </style>
</head>
<body>
<div class="navbar-fixed">
    <div class="nav-container">
        <a class="navbar-brand font-weight-bolder" style="font-size: 1.5rem; color: #50514F;" href="index.html">
            <h1 class="navbar-h1">GeKeCy-music</h1>
        </a>
        <a class="back-to-top" onclick="scrollToTop(this)">
                ↑ 回到顶部
            </a>
    </div>
</div>
<div class="main-content page-content">
<div class="container" style="max-width: 900px">

    <!-- Search Bar -->
    <div class="input-group mb-2" style="margin-top: 1rem !important;margin-bottom: .5rem !important;">
        <b class="search-img"></b>
        <form id="search-form" style="display: flex;">
        <input type="text" id="s-input" class="form-control text-center border border-info" placeholder="请输入歌名/歌手名" style="border-right-color: #31c27c !important;border-radius: 0.25rem 0 0 0.25rem !important;height: 40px;flex:1;scroll-margin-top:80px;">
        <button type="submit" class="btn btn-custom shadow-sm rounded-sm btn-block mb-1" id="s-btn" style="width: 60px;padding: 0px;flex-shrink: 0;">
            <i class="fa fa-search"></i>
        </button>
        </form>
        <div id="invalid-msg" class="invalid-feedback"></div>
    </div>

    <!-- Hot Search -->
    <div class="card shadow-sm mb-1" id="hot-search-card">
        <div class="card-body">
            <h6 class="card-title" style="display:flex;justify-content:space-between;align-items:center;">
                <span><i class="fa fa-fire" style="color:#ff4d4f"></i> 热门搜索 <small class="text-muted" style="font-size:12px">实时更新</small></span>
                <a href="hot.html" style="font-size:13px;color:#31c27c;">更多搜索 <i class="fa fa-angle-right"></i></a>
            </h6>
            <div id="hot-list" style="margin-top: 10px;">
                <span class="text-muted">加载中...</span>
            </div>
        </div>
    </div>

    <!-- Hot Artists -->
    <div class="card shadow-sm mb-1" id="hot-artists-card">
        <div class="card-body">
            <h6 class="card-title" style="display:flex;justify-content:space-between;align-items:center;">
                <span><i class="fa fa-user" style="color:#31c27c"></i> 热门歌手 <small class="text-muted" style="font-size:12px">实时更新</small></span>
                <a href="artists.html" style="font-size:13px;color:#31c27c;">更多歌手 <i class="fa fa-angle-right"></i></a>
            </h6>
            <div id="artist-list" style="margin-top: 10px;">
                <span class="text-muted">加载中...</span>
            </div>
        </div>
    </div>
</div>
</div>

<footer>
    <div class="container" style="max-width: 900px;">
        <div class="text-center">
            <a href="index.html" class="font-weight-bold" style="font-size:18px;color:#fff;">GeKeCy-music</a>
            <div class="footer-links">
                <a href="index.html">首页</a>
                <a href="https://github.com/GeKeCy/GeKeCy_Music.github.io" target="_blank">GitHub</a>
            </div>
            <div style="font-size:12px;color:#666;margin-top:10px;">
                GeKeCy-music &copy; 2026 &middot; 仅供学习交流使用
            </div>
        </div>
    </div>
</footer>

<script type="text/javascript">
    function escapeHtml(text) {
        var div = document.createElement('div');
        div.appendChild(document.createTextNode(text));
        return div.innerHTML;
    }

    function doSearch(keyword) {
        if (keyword) {
            window.location.href = 'search.html?keyword=' + encodeURIComponent(keyword);
        }
    }

    function scrollToTop(el) {
        window.scrollTo(0, 0);
        el.classList.add('active');
        setTimeout(function() {
            el.classList.remove('active');
        }, 2000);
    }

    $(function() {
        var lockScrollY = null;
        function preventScroll() {
            if (lockScrollY !== null) {
                window.scrollTo(0, lockScrollY);
            }
        }
        $('#s-input').focus(function() {
            $(this).removeClass('is-invalid');
            $(".search-img").animate({"height": "24px", "top": "-24px"}, 1000);
            lockScrollY = window.scrollY;
            window.addEventListener('scroll', preventScroll, { passive: false });
        }).blur(function() {
            $(".search-img").animate({"height": "0", "top": "0"}, 1000);
            lockScrollY = null;
            window.removeEventListener('scroll', preventScroll);
        });

        $('#search-form').submit(function(e) {
            e.preventDefault();
            var keyword = $('#s-input').val().trim();
            if (keyword) {
                doSearch(keyword);
            }
        });

        var FALLBACK = [
            { rank: 1, keyword: '加木' }, { rank: 2, keyword: '海屿你' },
            { rank: 3, keyword: '时差' }, { rank: 4, keyword: '阴天' },
            { rank: 5, keyword: '无人之岛' }, { rank: 6, keyword: '玻璃' },
            { rank: 7, keyword: '失眠' }, { rank: 8, keyword: 'Angel' },
            { rank: 9, keyword: '空山·野马' }, { rank: 10, keyword: '讨厌' },
            { rank: 11, keyword: '周杰伦' }, { rank: 12, keyword: '林俊杰' },
            { rank: 13, keyword: '薛之谦' }, { rank: 14, keyword: '邓紫棋' },
            { rank: 15, keyword: '陈奕迅' }, { rank: 16, keyword: '王力宏' },
            { rank: 17, keyword: '李荣浩' }, { rank: 18, keyword: '毛不易' },
            { rank: 19, keyword: '华晨宇' }, { rank: 20, keyword: '孙燕姿' }
        ];

        function renderHots(data) {
            var html = '';
            data.forEach(function(item) {
                var rankClass = '';
                if (item.rank <= 3) rankClass = 'top' + item.rank;
                html += '<span class="hot-tag ' + rankClass + '" onclick="doSearch(\'' + escapeHtml(item.keyword).replace(/'/g, "\\'") + '\')">' +
                    '<span class="rank">' + item.rank + '</span>' + escapeHtml(item.keyword) + '</span>';
            });
            $('#hot-list').html(html);
        }

        // 调用网易云热搜API（search/hot/detail，返回20条，支持CORS跨域）
        $.getJSON('https://music163.xuanmou.com.cn/search/hot/detail', function(res) {
            try {
                if (res && res.code === 200 && res.data) {
                    var hots = res.data.map(function(h, i) {
                        return { rank: i + 1, keyword: h.searchWord };
                    });
                    if (hots.length > 0) {
                        renderHots(hots);
                    } else {
                        renderHots(FALLBACK);
                    }
                } else {
                    renderHots(FALLBACK);
                }
            } catch(e) {
                renderHots(FALLBACK);
            }
        }).fail(function() {
            renderHots(FALLBACK);
        });

        // 热门歌手（前20个）
        var ARTIST_FALLBACK = [
            { name: '林俊杰' }, { name: '薛之谦' }, { name: '周杰伦' },
            { name: '陈奕迅' }, { name: '邓紫棋' }, { name: '毛不易' },
            { name: '华晨宇' }, { name: '李荣浩' }, { name: '张学友' },
            { name: '王菲' }, { name: '五月天' }, { name: 'Taylor Swift' },
            { name: '许嵩' }, { name: '林宥嘉' }, { name: '张惠妹' },
            { name: '孙燕姿' }, { name: '蔡依林' }, { name: '萧敬腾' },
            { name: '王力宏' }, { name: '莫文蔚' }
        ];

        function renderArtists(data) {
            var html = '';
            data.forEach(function(item) {
                var rankClass = '';
                if (item.rank <= 3) rankClass = 'top' + item.rank;
                var imgHtml = item.picUrl ? '<img src="' + escapeHtml(item.picUrl) + '" onerror="this.style.display=\'none\'">' : '';
                html += '<span class="artist-tag ' + rankClass + '" onclick="doSearch(\'' + escapeHtml(item.name).replace(/'/g, "\\'") + '\')">' +
                    '<span class="rank">' + item.rank + '</span>' + imgHtml + escapeHtml(item.name) + '</span>';
            });
            $('#artist-list').html(html);
        }

        $.getJSON('https://music163.xuanmou.com.cn/toplist/artist', function(res) {
            try {
                var artists = (res && res.list && res.list.artists) ? res.list.artists : [];
                if (artists.length > 0) {
                    var top20 = artists.slice(0, 20).map(function(a, i) {
                        return { rank: i + 1, name: a.name, picUrl: a.picUrl ? a.picUrl.replace('http://', 'https://') : '' };
                    });
                    renderArtists(top20);
                } else {
                    var fb = ARTIST_FALLBACK.map(function(a, i) { return { rank: i + 1, name: a.name, picUrl: '' }; });
                    renderArtists(fb);
                }
            } catch(e) {
                var fb = ARTIST_FALLBACK.map(function(a, i) { return { rank: i + 1, name: a.name, picUrl: '' }; });
                renderArtists(fb);
            }
        }).fail(function() {
            var fb = ARTIST_FALLBACK.map(function(a, i) { return { rank: i + 1, name: a.name, picUrl: '' }; });
            renderArtists(fb);
        });
    });
</script>
</body>
</html>
