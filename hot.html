<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>热门搜索榜 - GeKeCy-music</title>
    <link href="static/css/common.css" type="text/css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="static/css/site.min.css">
    <link href="//lib.baomitu.com/twitter-bootstrap/4.6.1/css/bootstrap.min.css" type="text/css" rel="stylesheet">
    <link href="//lib.baomitu.com/font-awesome/4.7.0/css/font-awesome.min.css" type="text/css" rel="stylesheet">
    <script src="//lib.baomitu.com/jquery/3.6.0/jquery.min.js" type="application/javascript"></script>
    <script defer src="//lib.baomitu.com/twitter-bootstrap/4.6.1/js/bootstrap.min.js" type="application/javascript"></script>
    <style>
        html, body { height: 100%; margin: 0; }
        body { display: flex; flex-direction: column; min-height: 100vh; font-family: "Microsoft YaHei", "Helvetica Neue", Helvetica, STHeiTi, sans-serif; }
        .main-content { flex: 1 0 auto; }
        .navbar-h1 { display: inline; font-size: 1.5rem; font-weight: 700; }
        .card {
            margin-top: 15px; position: relative; display: flex; flex-direction: column;
            min-width: 0; word-wrap: break-word; background-color: #fff;
            background-clip: border-box; border: 1px solid rgba(0,0,0,.125);
            border-radius: .5rem; font-size: 15px;
        }
        a { color: #333; text-decoration: none; background-color: transparent; }
        a:hover { color: #31c27c; text-decoration: none; }

        .hot-row {
            display: flex; align-items: center; padding: 12px 15px; border-bottom: 1px solid #f0f0f0;
            cursor: pointer; transition: background-color 0.2s;
        }
        .hot-row:hover { background-color: #f9f9f9; }
        .hot-row:last-child { border-bottom: none; }
        .hot-rank {
            width: 40px; text-align: center; font-size: 18px; font-weight: 700; color: #999; flex-shrink: 0;
        }
        .hot-row.top1 .hot-rank { color: #ff4d4f; }
        .hot-row.top2 .hot-rank { color: #ff7a45; }
        .hot-row.top3 .hot-rank { color: #ffa940; }
        .hot-info { flex: 1; min-width: 0; }
        .hot-word { font-size: 16px; font-weight: 600; color: #333; }
        .hot-desc { font-size: 12px; color: #999; margin-top: 2px; }
        .hot-score { font-size: 13px; color: #ff4d4f; font-weight: 600; flex-shrink: 0; }
        .hot-icon { font-size: 12px; margin-left: 5px; }

        .loading { text-align: center; padding: 40px; color: #999; }

        footer {
            flex-shrink: 0; background-color: #343a40; color: #999;
            padding: 40px 0 20px 0; margin-top: auto;
        }
        footer a { color: #ccc; }
        footer a:hover { color: #31c27c; }
        .footer-links { margin: 10px 0; }
        .footer-links a { margin: 0 10px; font-size: 13px; }
    </style>
</head>
<body>
<div class="main-content">
<div class="container" style="max-width: 900px">
    <nav class="navbar navbar-light bg-white px-0 mb-1 font-weight-normal">
        <a class="navbar-brand font-weight-bolder" style="font-size: 1.5rem; color: #50514F;" href="index.html">
            <h1 class="navbar-h1">GeKeCy-music</h1>
        </a>
    </nav>

    <div class="card shadow-sm">
        <div class="card-body">
            <h5 class="card-title" style="margin-bottom: 15px;">
                <i class="fa fa-fire" style="color:#ff4d4f"></i> 热门搜索榜
                <small class="text-muted" style="font-size:12px">实时更新</small>
            </h5>
            <div id="loading" class="loading">
                <i class="fa fa-spinner fa-spin"></i> 加载中...
            </div>
            <div id="hot-list"></div>
            <div id="load-error" class="loading" style="display:none;color:#ff4d4f;">
                <i class="fa fa-exclamation-circle"></i> 加载失败，请刷新重试
            </div>
        </div>
    </div>
</div>
</div>

<footer>
    <div class="container" style="max-width: 900px;">
        <div class="text-center">
            <a href="index.html" class="font-weight-bold" style="font-size:18px;color:#fff;">GeKeCy-music</a>
            <div class="footer-links">
                <a href="index.html">首页</a>
                <a href="https://github.com/GeKeCy/GeKeCy_Music.github.io" target="_blank">GitHub</a>
            </div>
            <div style="font-size:12px;color:#666;margin-top:10px;">
                GeKeCy-music &copy; 2026 &middot; 仅供学习交流使用
            </div>
        </div>
    </div>
</footer>

<script type="text/javascript">
    function escapeHtml(text) {
        var div = document.createElement('div');
        div.appendChild(document.createTextNode(text));
        return div.innerHTML;
    }

    function doSearch(keyword) {
        if (keyword) {
            window.location.href = 'search.html?keyword=' + encodeURIComponent(keyword);
        }
    }

    function formatScore(score) {
        if (!score) return '';
        if (score >= 100000000) return (score / 100000000).toFixed(1) + '亿';
        if (score >= 10000) return (score / 10000).toFixed(1) + '万';
        return score.toString();
    }

    $(function() {
        var FALLBACK = [
            { searchWord: '加木', score: 0, content: '' },
            { searchWord: '海屿你', score: 0, content: '' },
            { searchWord: '时差', score: 0, content: '' },
            { searchWord: '阴天', score: 0, content: '' },
            { searchWord: '无人之岛', score: 0, content: '' },
            { searchWord: '玻璃', score: 0, content: '' },
            { searchWord: '失眠', score: 0, content: '' },
            { searchWord: 'Angel', score: 0, content: '' },
            { searchWord: '空山·野马', score: 0, content: '' },
            { searchWord: '讨厌', score: 0, content: '' }
        ];

        function renderHots(data) {
            var html = '';
            data.forEach(function(item, i) {
                var rank = i + 1;
                var rankClass = '';
                if (rank <= 3) rankClass = 'top' + rank;
                var descHtml = item.content ? '<div class="hot-desc">' + escapeHtml(item.content) + '</div>' : '';
                var scoreHtml = item.score ? '<div class="hot-score">' + formatScore(item.score) + '</div>' : '';

                html += '<div class="hot-row ' + rankClass + '" onclick="doSearch(\'' + escapeHtml(item.searchWord).replace(/'/g, "\\'") + '\')">' +
                    '<div class="hot-rank">' + rank + '</div>' +
                    '<div class="hot-info">' +
                        '<div class="hot-word">' + escapeHtml(item.searchWord) + '</div>' +
                        descHtml +
                    '</div>' +
                    scoreHtml +
                '</div>';
            });
            $('#loading').hide();
            $('#hot-list').html(html);
        }

        $.getJSON('https://music163.xuanmou.com.cn/search/hot/detail', function(res) {
            try {
                if (res && res.code === 200 && res.data && res.data.length > 0) {
                    renderHots(res.data);
                } else {
                    renderHots(FALLBACK);
                }
            } catch(e) {
                renderHots(FALLBACK);
            }
        }).fail(function() {
            renderHots(FALLBACK);
        });
    });
</script>
</body>
</html>
