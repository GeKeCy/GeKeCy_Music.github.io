<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>热门榜单 - GeKeCy-music</title>
    <link href="static/css/common.css" type="text/css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="static/css/site.min.css">
    <link href="//lib.baomitu.com/twitter-bootstrap/4.6.1/css/bootstrap.min.css" type="text/css" rel="stylesheet">
    <link href="//lib.baomitu.com/font-awesome/4.7.0/css/font-awesome.min.css" type="text/css" rel="stylesheet">
    <script src="//lib.baomitu.com/jquery/3.6.0/jquery.min.js" type="application/javascript"></script>
    <script defer src="//lib.baomitu.com/twitter-bootstrap/4.6.1/js/bootstrap.min.js" type="application/javascript"></script>
    <style>
        html, body { height: auto; margin: 0; overflow-x: hidden; }
        body { display: flex; flex-direction: column; font-family: "Microsoft YaHei", "Helvetica Neue", Helvetica, STHeiTi, sans-serif; }
        .main-content { flex: 0 0 auto; width: 100%; }
        .navbar-h1 { display: inline; font-size: 1.5rem; font-weight: 700; }
        .card {
            margin-top: 15px; position: relative; display: flex; flex-direction: column;
            min-width: 0; word-wrap: break-word; background-color: #fff;
            background-clip: border-box; border: 1px solid rgba(0,0,0,.125);
            border-radius: .5rem; font-size: 15px;
        }
        a { color: #333; text-decoration: none; background-color: transparent; }
        a:hover { color: #31c27c; text-decoration: none; }

        .navbar-fixed {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background-color: #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .navbar-fixed .nav-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 56px;
        }
        .back-to-top {
            color: #31c27c;
            font-size: 13px;
            cursor: pointer;
            padding: 4px 8px;
            position: relative;
            transition: color 0.2s;
        }
        .back-to-top:hover { color: #2ab06d; }
        .back-to-top.active::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            right: 0;
            height: 2px;
            background-color: #31c27c;
            animation: fadeOut 2s forwards;
        }
        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }
        .page-content { padding-top: 56px; }

        .tab-bar {
            display: flex; border-bottom: 2px solid #f0f0f0; margin-bottom: 10px;
            overflow-x: auto; white-space: nowrap;
        }
        .tab-item {
            padding: 10px 16px; font-size: 15px; color: #666; cursor: pointer;
            border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.2s;
            flex-shrink: 0;
        }
        .tab-item:hover { color: #31c27c; }
        .tab-item.active { color: #31c27c; border-bottom-color: #31c27c; font-weight: 600; }

        .hot-row {
            display: flex; align-items: center; padding: 12px 15px; border-bottom: 1px solid #f0f0f0;
            cursor: pointer; transition: background-color 0.2s;
        }
        .hot-row:hover { background-color: #f9f9f9; }
        .hot-row:last-child { border-bottom: none; }
        .hot-rank {
            width: 40px; text-align: center; font-size: 18px; font-weight: 700; color: #999; flex-shrink: 0; white-space: nowrap;
        }
        .hot-row.top1 .hot-rank { color: #ff4d4f; }
        .hot-row.top2 .hot-rank { color: #ff7a45; }
        .hot-row.top3 .hot-rank { color: #ffa940; }
        .hot-info { flex: 1; min-width: 0; }
        .hot-word { font-size: 16px; font-weight: 600; color: #333; }
        .hot-desc { font-size: 12px; color: #999; margin-top: 2px; }
        .hot-artist { font-size: 13px; color: #999; margin-top: 2px; }
        .hot-score { font-size: 13px; color: #ff4d4f; font-weight: 600; flex-shrink: 0; }

        .loading { text-align: center; padding: 40px; color: #999; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        footer {
            flex-shrink: 0; background-color: #343a40; color: #999;
            padding: 40px 0 20px 0; margin-top: 30px; width: 100%;
        }
        footer a { color: #ccc; }
        footer a:hover { color: #31c27c; }
        .footer-links { margin: 10px 0; }
        .footer-links a { margin: 0 10px; font-size: 13px; }
    </style>
</head>
<body>
<div class="navbar-fixed">
    <div class="nav-container">
        <a class="navbar-brand font-weight-bolder" style="font-size: 1.5rem; color: #50514F;" href="index.html">
            <h1 class="navbar-h1">GeKeCy-music</h1>
        </a>
        <a class="back-to-top" onclick="scrollToTop(this)">
                <i class="fa fa-arrow-up"></i> 回到顶部
            </a>
    </div>
</div>
<div class="main-content page-content">
<div class="container" style="max-width: 900px">

    <div class="card shadow-sm">
        <div class="card-body">
            <h5 class="card-title" style="margin-bottom: 10px;">
                <i class="fa fa-fire" style="color:#ff4d4f"></i> 热门榜单
                <small class="text-muted" style="font-size:12px">实时更新</small>
            </h5>
            <div class="tab-bar">
                <div class="tab-item active" data-tab="hot-search">热搜榜</div>
                <div class="tab-item" data-tab="hot-song">热歌榜</div>
                <div class="tab-item" data-tab="soaring">飙升榜</div>
                <div class="tab-item" data-tab="new-song">新歌榜</div>
            </div>

            <div id="tab-hot-search" class="tab-content active">
                <div class="loading"><i class="fa fa-spinner fa-spin"></i> 加载中...</div>
                <div class="hot-list"></div>
            </div>
            <div id="tab-hot-song" class="tab-content">
                <div class="loading"><i class="fa fa-spinner fa-spin"></i> 加载中...</div>
                <div class="hot-list"></div>
            </div>
            <div id="tab-soaring" class="tab-content">
                <div class="loading"><i class="fa fa-spinner fa-spin"></i> 加载中...</div>
                <div class="hot-list"></div>
            </div>
            <div id="tab-new-song" class="tab-content">
                <div class="loading"><i class="fa fa-spinner fa-spin"></i> 加载中...</div>
                <div class="hot-list"></div>
            </div>
        </div>
    </div>
</div>
</div>

<footer>
    <div class="container" style="max-width: 900px;">
        <div class="text-center">
            <a href="index.html" class="font-weight-bold" style="font-size:18px;color:#fff;">GeKeCy-music</a>
            <div class="footer-links">
                <a href="index.html">首页</a>
                <a href="https://github.com/GeKeCy/GeKeCy_Music.github.io" target="_blank">GitHub</a>
            </div>
            <div style="font-size:12px;color:#666;margin-top:10px;">
                GeKeCy-music &copy; 2026 &middot; 仅供学习交流使用
            </div>
        </div>
    </div>
</footer>

<script type="text/javascript">
    function escapeHtml(text) {
        var div = document.createElement('div');
        div.appendChild(document.createTextNode(text));
        return div.innerHTML;
    }

    function doSearch(keyword) {
        if (keyword) {
            window.location.href = 'search.html?keyword=' + encodeURIComponent(keyword);
        }
    }

    function scrollToTop(el) {
        window.scrollTo(0, 0);
        el.classList.add('active');
        setTimeout(function() {
            el.classList.remove('active');
        }, 2000);
    }

    function renderList(tabId, items, type) {
        var $tab = $('#tab-' + tabId);
        var html = '';
        items.forEach(function(item, i) {
            var rank = i + 1;
            var rankClass = '';
            if (rank <= 3) rankClass = 'top' + rank;
            var word = '';
            var desc = '';
            var score = '';
            if (type === 'search') {
                word = item.searchWord || '';
                desc = item.content || '';
                score = item.score || '';
            } else {
                word = item.name || '';
                desc = item.artist || '';
            }

            var descHtml = desc ? '<div class="' + (type === 'search' ? 'hot-desc' : 'hot-artist') + '">' + escapeHtml(desc) + '</div>' : '';
            var scoreHtml = score ? '<div class="hot-score">' + formatScore(score) + '</div>' : '';

            html += '<div class="hot-row ' + rankClass + '" onclick="doSearch(\'' + escapeHtml(word).replace(/'/g, "\\'") + '\')">' +
                '<div class="hot-rank">' + rank + '</div>' +
                '<div class="hot-info">' +
                    '<div class="hot-word">' + escapeHtml(word) + '</div>' +
                    descHtml +
                '</div>' +
                scoreHtml +
            '</div>';
        });
        $tab.find('.loading').hide();
        $tab.find('.hot-list').html(html);
    }

    function formatScore(score) {
        if (!score) return '';
        if (score >= 100000000) return (score / 100000000).toFixed(1) + '亿';
        if (score >= 10000) return (score / 10000).toFixed(1) + '万';
        return score.toString();
    }

    function getPlaylist(id, callback) {
        $.getJSON('https://music163.xuanmou.com.cn/playlist/detail?id=' + id, function(res) {
            try {
                var tracks = (res && res.playlist && res.playlist.tracks) ? res.playlist.tracks : [];
                var list = tracks.map(function(t) {
                    var artist = (t.ar && t.ar[0]) ? t.ar[0].name : '';
                    return { name: t.name, artist: artist };
                });
                callback(list);
            } catch(e) {
                callback([]);
            }
        }).fail(function() { callback([]); });
    }

    $(function() {
        $('.tab-item').click(function() {
            var tab = $(this).data('tab');
            $('.tab-item').removeClass('active');
            $(this).addClass('active');
            $('.tab-content').removeClass('active');
            $('#tab-' + tab).addClass('active');
        });

        // 热搜榜
        $.getJSON('https://music163.xuanmou.com.cn/search/hot/detail', function(res) {
            try {
                var data = (res && res.code === 200 && res.data) ? res.data : [];
                if (data.length > 0) {
                    renderList('hot-search', data, 'search');
                }
            } catch(e) {}
        });

        // 热歌榜
        getPlaylist(3778678, function(list) {
            if (list.length > 0) renderList('hot-song', list, 'song');
        });

        // 飙升榜
        getPlaylist(19723756, function(list) {
            if (list.length > 0) renderList('soaring', list, 'song');
        });

        // 新歌榜
        getPlaylist(3779629, function(list) {
            if (list.length > 0) renderList('new-song', list, 'song');
        });
    });
</script>
</body>
</html>
