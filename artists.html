<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>热门歌手排行榜 - GeKeCy-music</title>
    <link href="static/css/common.css" type="text/css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="static/css/site.min.css">
    <link href="//lib.baomitu.com/twitter-bootstrap/4.6.1/css/bootstrap.min.css" type="text/css" rel="stylesheet">
    <link href="//lib.baomitu.com/font-awesome/4.7.0/css/font-awesome.min.css" type="text/css" rel="stylesheet">
    <script src="//lib.baomitu.com/jquery/3.6.0/jquery.min.js" type="application/javascript"></script>
    <script defer src="//lib.baomitu.com/twitter-bootstrap/4.6.1/js/bootstrap.min.js" type="application/javascript"></script>
    <style>
        html, body { height: auto; margin: 0; overflow-x: hidden; }
        body { display: flex; flex-direction: column; font-family: "Microsoft YaHei", "Helvetica Neue", Helvetica, STHeiTi, sans-serif; }
        .main-content { flex: 0 0 auto; width: 100%; }
        .navbar-h1 { display: inline; font-size: 1.5rem; font-weight: 700; }
        .card {
            margin-top: 15px; position: relative; display: flex; flex-direction: column;
            min-width: 0; word-wrap: break-word; background-color: #fff;
            background-clip: border-box; border: 1px solid rgba(0,0,0,.125);
            border-radius: .5rem; font-size: 15px;
        }
        a { color: #333; text-decoration: none; background-color: transparent; }
        a:hover { color: #31c27c; text-decoration: none; }

        .navbar-fixed {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background-color: #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .navbar-fixed .nav-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 56px;
        }
        .back-to-top {
            color: #31c27c;
            font-size: 13px;
            cursor: pointer;
            padding: 4px 8px;
            position: relative;
            transition: color 0.2s;
        }
        .back-to-top:hover { color: #2ab06d; }
        .back-to-top.active::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            right: 0;
            height: 2px;
            background-color: #31c27c;
            animation: fadeOut 2s forwards;
        }
        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }
        .page-content { padding-top: 56px; }

        .artist-row {
            display: flex; align-items: center; padding: 12px 15px; border-bottom: 1px solid #f0f0f0;
            cursor: pointer; transition: background-color 0.2s;
        }
        .artist-row:hover { background-color: #f9f9f9; }
        .artist-row:last-child { border-bottom: none; }
        .artist-rank {
            width: 40px; text-align: center; font-size: 18px; font-weight: 700; color: #999; flex-shrink: 0; white-space: nowrap;
        }
        .artist-row.top1 .artist-rank { color: #ff4d4f; }
        .artist-row.top2 .artist-rank { color: #ff7a45; }
        .artist-row.top3 .artist-rank { color: #ffa940; }
        .artist-avatar {
            width: 50px; height: 50px; border-radius: 50%; margin-right: 15px; object-fit: cover; flex-shrink: 0;
            background-color: #f0f0f0;
        }
        .artist-info { flex: 1; min-width: 0; }
        .artist-name { font-size: 16px; font-weight: 600; color: #333; }
        .artist-meta { font-size: 12px; color: #999; margin-top: 2px; }
        .artist-score { font-size: 13px; color: #31c27c; font-weight: 600; flex-shrink: 0; }

        .loading { text-align: center; padding: 40px; color: #999; }

        footer {
            flex-shrink: 0; background-color: #343a40; color: #999;
            padding: 40px 0 20px 0; margin-top: 30px; width: 100%;
        }
        footer a { color: #ccc; }
        footer a:hover { color: #31c27c; }
        .footer-links { margin: 10px 0; }
        .footer-links a { margin: 0 10px; font-size: 13px; }
    </style>
</head>
<body>
<div class="navbar-fixed">
    <div class="nav-container">
        <a class="navbar-brand font-weight-bolder" style="font-size: 1.5rem; color: #50514F;" href="index.html">
            <h1 class="navbar-h1">GeKeCy-music</h1>
        </a>
        <a class="back-to-top" onclick="scrollToTop(this)">
                <i class="fa fa-arrow-up"></i> 回到顶部
            </a>
    </div>
</div>
<div class="main-content page-content">
<div class="container" style="max-width: 900px">

    <div class="card shadow-sm">
        <div class="card-body">
            <h5 class="card-title" style="margin-bottom: 15px;">
                <i class="fa fa-trophy" style="color:#ffa940"></i> 歌手排行榜
                <small class="text-muted" style="font-size:12px">实时更新</small>
            </h5>
            <div id="loading" class="loading">
                <i class="fa fa-spinner fa-spin"></i> 加载中...
            </div>
            <div id="artist-list"></div>
            <div id="load-error" class="loading" style="display:none;color:#ff4d4f;">
                <i class="fa fa-exclamation-circle"></i> 加载失败，请刷新重试
            </div>
        </div>
    </div>
</div>
</div>

<footer>
    <div class="container" style="max-width: 900px;">
        <div class="text-center">
            <a href="index.html" class="font-weight-bold" style="font-size:18px;color:#fff;">GeKeCy-music</a>
            <div class="footer-links">
                <a href="index.html">首页</a>
                <a href="https://github.com/GeKeCy/GeKeCy_Music.github.io" target="_blank">GitHub</a>
            </div>
            <div style="font-size:12px;color:#666;margin-top:10px;">
                GeKeCy-music &copy; 2026 &middot; 仅供学习交流使用
            </div>
        </div>
    </div>
</footer>

<script type="text/javascript">
    function escapeHtml(text) {
        var div = document.createElement('div');
        div.appendChild(document.createTextNode(text));
        return div.innerHTML;
    }

    function doSearch(keyword) {
        if (keyword) {
            window.location.href = 'search.html?keyword=' + encodeURIComponent(keyword);
        }
    }

    function scrollToTop(el) {
        window.scrollTo(0, 0);
        el.classList.add('active');
        setTimeout(function() {
            el.classList.remove('active');
        }, 2000);
    }

    function formatScore(score) {
        if (!score) return '';
        if (score >= 100000000) return (score / 100000000).toFixed(1) + '亿';
        if (score >= 10000) return (score / 10000).toFixed(1) + '万';
        return score.toString();
    }

    $(function() {
        var FALLBACK = [
            { name: '林俊杰', score: 63548249, albumSize: 73, musicSize: 598 },
            { name: '薛之谦', score: 50000000, albumSize: 25, musicSize: 300 },
            { name: '周杰伦', score: 48000000, albumSize: 40, musicSize: 500 },
            { name: '陈奕迅', score: 45000000, albumSize: 60, musicSize: 450 },
            { name: '邓紫棋', score: 42000000, albumSize: 20, musicSize: 250 }
        ];

        function renderArtists(artists) {
            $('#loading').hide();
            var html = '';
            artists.forEach(function(a, i) {
                var rank = i + 1;
                var rankClass = '';
                if (rank <= 3) rankClass = 'top' + rank;
                var picUrl = a.picUrl ? a.picUrl.replace('http://', 'https://') : '';
                var avatarHtml = picUrl
                    ? '<img class="artist-avatar" src="' + escapeHtml(picUrl) + '" onerror="this.src=\'data:image/svg+xml,%3Csvg xmlns=\\\'http://www.w3.org/2000/svg\\\' viewBox=\\\'0 0 50 50\\\'%3E%3Crect fill=\\\'%23f0f0f0\\\' width=\\\'50\\\' height=\\\'50\\\'/%3E%3Ctext x=\\\'25\\\' y=\\\'30\\\' font-size=\\\'20\\\' fill=\\\'%23999\\\' text-anchor=\\\'middle\\\'%3E' + escapeHtml(a.name.charAt(0)) + '%3C/text%3E%3C/svg%3E\'">'
                    : '<div class="artist-avatar" style="display:flex;align-items:center;justify-content:center;font-size:20px;color:#999;">' + escapeHtml(a.name.charAt(0)) + '</div>';
                var metaParts = [];
                if (a.albumSize) metaParts.push(a.albumSize + '张专辑');
                if (a.musicSize) metaParts.push(a.musicSize + '首歌曲');
                var metaHtml = metaParts.length > 0 ? '<div class="artist-meta">' + metaParts.join(' · ') + '</div>' : '';
                var scoreHtml = a.score ? '<div class="artist-score">' + formatScore(a.score) + '</div>' : '';

                html += '<div class="artist-row ' + rankClass + '" onclick="doSearch(\'' + escapeHtml(a.name).replace(/'/g, "\\'") + '\')">' +
                    '<div class="artist-rank">' + rank + '</div>' +
                    avatarHtml +
                    '<div class="artist-info">' +
                        '<div class="artist-name">' + escapeHtml(a.name) + '</div>' +
                        metaHtml +
                    '</div>' +
                    scoreHtml +
                '</div>';
            });
            $('#artist-list').html(html);
        }

        // 获取排行榜100条（有热度分数）+ offset=100/200补充，去重后取前200条
        $.when(
            $.getJSON('https://music163.xuanmou.com.cn/toplist/artist'),
            $.getJSON('https://music163.xuanmou.com.cn/artist/list?cat=5001&limit=100&offset=100'),
            $.getJSON('https://music163.xuanmou.com.cn/artist/list?cat=5001&limit=100&offset=200')
        ).then(function(res1, res2, res3) {
            try {
                var ranked = (res1[0] && res1[0].list && res1[0].list.artists) ? res1[0].list.artists : [];
                var extra1 = (res2[0] && res2[0].artists) ? res2[0].artists : [];
                var extra2 = (res3[0] && res3[0].artists) ? res3[0].artists : [];
                var seen = {};
                var all = [];
                ranked.forEach(function(a) {
                    if (!seen[a.name]) {
                        seen[a.name] = true;
                        all.push(a);
                    }
                });
                extra1.concat(extra2).forEach(function(a) {
                    if (!seen[a.name]) {
                        seen[a.name] = true;
                        all.push(a);
                    }
                });
                all = all.slice(0, 200);
                if (all.length > 0) {
                    renderArtists(all);
                } else {
                    renderArtists(FALLBACK);
                }
            } catch(e) {
                renderArtists(FALLBACK);
            }
        }).fail(function() {
            renderArtists(FALLBACK);
        });
    });
</script>
</body>
</html>
